name: macOS Build
on:
  push:
    branches:
      - main
    paths:
      - axiom/**
      - velox
      - CMakeLists.txt
      - .github/workflows/macos.yml
      - Makefile
  pull_request:
    paths:
      - axiom/**
      - velox
      - CMakeLists.txt
      - .github/workflows/macos.yml
      - Makefile
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.repository }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true
jobs:
  macos-build:
    name: macOS ${{ matrix.build_type }}
    strategy:
      fail-fast: false
      matrix:
        build_type: [debug, release]
    runs-on: macos-15
    env:
      CCACHE_DIR: ${{ github.workspace }}/ccache
      INSTALL_PREFIX: /tmp/deps-install
      BUILD_TYPE: ${{ matrix.build_type }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: false

      - name: Install Dependencies
        env:
          HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: 'TRUE'
          CMAKE_POLICY_VERSION_MINIMUM: '3.5'
        run: |
          source velox/scripts/setup-macos.sh
          install_build_prerequisites
          install_velox_deps_from_brew
          install_gflags
          install_glog
          install_double_conversion

          echo "NJOBS=$(sysctl -n hw.ncpu)" >> $GITHUB_ENV
          echo "$INSTALL_PREFIX/bin" >> $GITHUB_PATH

      - name: Restore Ccache
        uses: apache/infrastructure-actions/stash/restore@3354c1565d4b0e335b78a76aedd82153a9e144d4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-macos-${{ matrix.build_type }}

      - name: Configure Build
        env:
          CMAKE_POLICY_VERSION_MINIMUM: '3.5'
          fmt_SOURCE: BUNDLED
        run: |
          ccache -sz -M 5Gi
          cmake \
              -B _build/$BUILD_TYPE \
              -GNinja \
              -DCMAKE_PREFIX_PATH="$INSTALL_PREFIX;$(brew --prefix icu4c)" \
              -DVELOX_ENABLE_PARQUET=ON \
              -DVELOX_MONO_LIBRARY=ON \
              -DVELOX_BUILD_SHARED=ON \
              -DVELOX_BUILD_TESTING=OFF \
              -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
              -DAXIOM_BUILD_TESTING=ON

      - name: Build
        run: |
          cmake --build _build/$BUILD_TYPE -j $NJOBS

      - name: CCache Statistics After Build
        if: always()
        run: ccache -vs

      - name: Save Ccache
        uses: apache/infrastructure-actions/stash/save@3354c1565d4b0e335b78a76aedd82153a9e144d4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-macos-${{ matrix.build_type }}

      - name: Run Tests
        run: |
          ctest --test-dir _build/$BUILD_TYPE -j $NJOBS --output-on-failure --no-tests=error
