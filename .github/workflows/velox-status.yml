# Updates a shields.io badge in README.md showing the Velox submodule version.
#
# Badge shows: commit hash, date, title, and how many commits behind main.
# Color: green (<=7 days old), yellow (<=30 days), red (>30 days).
#
# Setup:
#   1. Create a GitHub Gist with a file named velox-status.json.
#   2. Create a personal access token with 'gist' scope.
#   3. Add the token as a repository secret named GIST_TOKEN.
#
# Preview: https://img.shields.io/endpoint?url=https://gist.githubusercontent.com/mbasmanova/5cb356397f7f9a4435cf716ffcdffe08/raw/velox-status.json
# Gist: https://gist.github.com/mbasmanova/5cb356397f7f9a4435cf716ffcdffe08
name: Velox Status Badge
on:
  # TODO: Restore to main-only trigger after testing.
  push:
    branches:
      - main
      - velox-status-badge
    paths:
      - velox
      - .github/workflows/velox-status.yml
  schedule:
    # Run daily to update the "commits behind" count.
    - cron: '0 8 * * *'
permissions:
  contents: read
jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1
          persist-credentials: false

      - name: Compute Velox submodule status
        id: velox
        run: |
          # Get the submodule commit without cloning the full repo.
          SUBMODULE_SHA=$(git ls-tree HEAD velox | awk '{print $3}')

          # Fetch commit metadata from GitHub API.
          COMMIT_JSON=$(gh api repos/facebookincubator/velox/commits/$SUBMODULE_SHA)
          HASH=$(echo "$COMMIT_JSON" | jq -r '.sha[:10]')
          DATE=$(echo "$COMMIT_JSON" | jq -r '.commit.committer.date[:10]')
          TITLE=$(echo "$COMMIT_JSON" | jq -r '.commit.message' | head -1)

          # Count commits between submodule and latest main.
          COMPARE_JSON=$(gh api "repos/facebookincubator/velox/compare/${SUBMODULE_SHA}...main")
          BEHIND=$(echo "$COMPARE_JSON" | jq -r '.ahead_by')

          # Determine color based on age.
          COMMIT_DATE_EPOCH=$(date -d "$DATE" +%s)
          NOW_EPOCH=$(date +%s)
          DAYS_OLD=$(( (NOW_EPOCH - COMMIT_DATE_EPOCH) / 86400 ))
          if [ "$DAYS_OLD" -le 7 ]; then
            COLOR="28A745"
          elif [ "$DAYS_OLD" -le 30 ]; then
            COLOR="DBAB09"
          else
            COLOR="CB2431"
          fi

          echo "message=$HASH ($DATE) $TITLE — $BEHIND commits behind" >> $GITHUB_OUTPUT
          echo "color=$COLOR" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: 5cb356397f7f9a4435cf716ffcdffe08
          filename: velox-status.json
          label: velox
          message: ${{ steps.velox.outputs.message }}
          color: ${{ steps.velox.outputs.color }}
          labelColor: "24292E"
