name: Linux Build
on:
  push:
    branches:
      - main
    paths:
      - axiom/**
      - velox
      - CMakeLists.txt
      - .github/workflows/linux.yml
      - Makefile
  pull_request:
    paths:
      - axiom/**
      - velox
      - CMakeLists.txt
      - .github/workflows/linux.yml
      - Makefile
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.repository }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true
jobs:
  build-axiom:
    strategy:
      fail-fast: false
      matrix:
        build_type: [debug, release]
    name: Linux ${{ matrix.build_type }}
    runs-on: 32-core-ubuntu
    container:
      image: ghcr.io/facebookincubator/velox-dev:centos9
    env:
      CCACHE_DIR: ${{ github.workspace }}/ccache
      VELOX_DEPENDENCY_SOURCE: SYSTEM
      ICU_SOURCE: SYSTEM
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: false
      - name: Configure Git Safe Directory
        run: git config --global --add safe.directory "*"

      - name: Ensure Ccache Dir Exists
        run: mkdir -p "$CCACHE_DIR"

      - name: Restore Ccache
        uses: apache/infrastructure-actions/stash/restore@3354c1565d4b0e335b78a76aedd82153a9e144d4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-ubuntu-${{ matrix.build_type }}-default-gcc
      - name: Ccache Restore Status
        run: echo "Restored ccache $(du -sh $CCACHE_DIR 2>/dev/null | cut -f1 || echo empty)"

      - name: Configure Build
        run: |
          if [ "${{ matrix.build_type }}" = "release" ]; then
            ccache -sz -M 1Gi
          else
            ccache -sz -M 5Gi
          fi

      - name: Build
        env:
          MAKEFLAGS: NUM_THREADS=4 MAX_HIGH_MEM_JOBS=4 MAX_LINK_JOBS=2
          CPU_TARGET: "avx"
        run: |
          make ${{ matrix.build_type }}

      - name: CCache Statistics After Build
        if: always()
        run: |
          echo "--- ccache summary ---"
          ccache -s | grep -E "Hits|Misses|size|evicted"
          echo "Cache dir size: $(du -sh $CCACHE_DIR 2>/dev/null | cut -f1)"
          echo ""
          echo "--- ccache full stats ---"
          ccache -vs
          echo ""
          echo "--- evicting stale entries ---"
          ccache --evict-older-than 1d
          echo "Cache dir size after eviction: $(du -sh $CCACHE_DIR 2>/dev/null | cut -f1)"

      - name: Save Ccache
        uses: apache/infrastructure-actions/stash/save@3354c1565d4b0e335b78a76aedd82153a9e144d4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-ubuntu-${{ matrix.build_type }}-default-gcc

      - name: Run Tests
        run: |
          ctest --test-dir _build/${{ matrix.build_type }} -j 8 --output-on-failure --no-tests=error
